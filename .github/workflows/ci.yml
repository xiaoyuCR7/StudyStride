name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 前端构建测试
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npm run build
    - name: Build
      run: npm run build

  # API 测试
  api-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_URL: ${{ secrets.SUPABASE_AUTH_URL }}
      SUPABASE_REST_URL: ${{ secrets.SUPABASE_REST_URL }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install dependencies
      run: |
        cd test_api
        pip install -r requirements.txt
    - name: Run API tests
      run: |
        cd test_api
        pytest

  # Web 测试
  web-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
      BROWSER: 'chromium'
      HEADLESS: 'true'
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install dependencies
      run: |
        cd test_web
        pip install -r requirements.txt
    - name: Install Playwright browsers
      run: |
        cd test_web
        playwright install chromium
    - name: Start development server
      run: |
        npm ci
        npm run dev &
        sleep 10  # 等待服务器启动
    - name: Run Web tests
      run: |
        cd test_web
        pytest

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test, web-test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Build for production
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4