name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 前端构建测试
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npm run build
    - name: Build
      run: npm run build

  # API 测试
  api-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_URL: ${{ secrets.SUPABASE_AUTH_URL }}
      SUPABASE_REST_URL: ${{ secrets.SUPABASE_REST_URL }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install dependencies
      run: |
        cd test_api
        pip install -r requirements.txt
    - name: Run API tests
      run: |
        cd test_api
        pytest

  # Web 测试
  web-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
      BROWSER: 'chromium'
      HEADLESS: 'true'
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install dependencies
      run: |
        cd test_web
        pip install -r requirements.txt
    - name: Install Playwright browsers
      run: |
        cd test_web
        playwright install chromium
    - name: Start development server
      run: |
        npm ci
        npm run dev &
        sleep 10  # 等待服务器启动
    - name: Run Web tests
      run: |
        cd test_web
        pytest

  # 部署（可选）
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test, web-test]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 确保获取完整的 Git 历史
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm ci
    - name: Build for production
      run: npm run build
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        force_orphan: true  # 强制创建新的孤儿分支
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'