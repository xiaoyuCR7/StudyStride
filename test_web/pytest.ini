[pytest]
# 测试目录
testpaths = testcases

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    

# 警告过滤
filterwarnings =
    

# Allure报告配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 失败重试
reruns = 2
reruns_delay = 1

# 禁用敏感 URL 检查
sensitiveurl = None


