# 默认环境配置
default_env: dev

# 环境配置
environments:
  dev:
    name: "开发环境"
    base_url: "https://pkhlytcqjgspkmsmzxpg.supabase.co"
    auth_url: "https://pkhlytcqjgspkmsmzxpg.supabase.co/auth/v1"
    rest_url: "https://pkhlytcqjgspkmsmzxpg.supabase.co/rest/v1"
    anon_key: "sb_publishable_ZF3uREWZRRqZpfV-zykABw_W802i9ig"
    timeout: 30
    retry_times: 3
    retry_interval: 1
    
  test:
    name: "测试环境"
    base_url: "https://test-project-id.supabase.co"
    auth_url: "https://test-project-id.supabase.co/auth/v1"
    rest_url: "https://test-project-id.supabase.co/rest/v1"
    anon_key: "test-anon-key"
    timeout: 30
    retry_times: 3
    retry_interval: 1
    
  prod:
    name: "生产环境"
    base_url: "https://prod-project-id.supabase.co"
    auth_url: "https://prod-project-id.supabase.co/auth/v1"
    rest_url: "https://prod-project-id.supabase.co/rest/v1"
    anon_key: "prod-anon-key"
    timeout: 30
    retry_times: 3
    retry_interval: 1

# 数据库配置
database:
  study_sessions_table: "study_sessions"
  subjects_table: "subjects"
  user_settings_table: "user_settings"

# 测试配置
test:
  # 用例标记
  markers:
    - smoke: "冒烟测试"
    - regression: "回归测试"
    - api: "接口测试"
    - auth: "认证测试"
    - study_session: "学习会话测试"
    - subject: "科目测试"
    - user_settings: "用户设置测试"
    - positive: "正向测试"
    - negative: "负向测试"
    - critical: "关键用例"
  
  # 失败重试配置
  retry:
    enabled: true
    max_times: 3
    delay: 1
  
  # Allure报告配置
  allure:
    enabled: true
    report_dir: "reports/allure-results"
    history_dir: "reports/allure-history"
    clean: true
    
  # 截图配置
  screenshot:
    enabled: true
    on_failure: true
    on_success: false
    dir: "screenshots"
    
  # 日志配置
  logging:
    level: "INFO"
    dir: "logs"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: true
    console: true

# 数据驱动配置
data_driven:
  data_dir: "data"
  formats:
    - yaml
    - json
    - csv
    - excel
