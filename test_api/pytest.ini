[pytest]
# 测试目录
testpaths = testcases

# 测试文件匹配模式
python_files = test_subject.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: 接口测试
    auth: 认证测试
    study_session: 学习会话测试
    subject: 科目测试
    user_settings: 用户设置测试
    positive: 正向测试
    negative: 负向测试
    critical: 关键用例

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Allure报告配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 失败重试
reruns = 2
reruns_delay = 1
